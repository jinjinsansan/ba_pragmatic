<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BACOPY</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="h1">BACOPY Receiver</div>
      <div class="small">Executor + Watchers (copytrade)</div>
    </header>

    <main>
      <section class="card">
        <div class="sectionTitle">Master API</div>
        <div class="grid2">
          <label>API URL
            <input id="apiUrl" placeholder="https://master.example.com" />
          </label>
          <label>API KEY (Bearer)
            <input id="apiKey" placeholder="(secret)" type="password" />
          </label>
        </div>
        <div class="row">
          <label class="toggle">
            <input id="pushSnapshots" type="checkbox" />
            <span>Push snapshots to Master</span>
          </label>
          <label>Python exe
            <input id="pythonExe" placeholder="python" />
          </label>
          <button id="btnSave" class="primary">SAVE</button>
        </div>
      </section>

      <section class="card">
        <div class="sectionTitle">Executor (Pragmatic Live)</div>
        <div class="grid3">
          <label>Executor ID
            <input id="executorId" />
          </label>
          <label>Label
            <input id="executorLabel" />
          </label>
          <label>Username (display)
            <input id="executorUsername" />
          </label>

          <label>Table name substr (initial join)
            <input id="tableSubstr" />
          </label>
          <label>Only table ID (optional)
            <input id="onlyTableId" placeholder="415" />
          </label>
          <label>Flat amount
            <input id="flatAmount" type="number" step="1" min="1" />
          </label>

          <label>Auto click wait (sec)
            <input id="autoClickWaitSec" type="number" step="1" min="10" />
          </label>
          <label class="toggle">
            <input id="allowSwitchTable" type="checkbox" />
            <span>Allow SWITCH_TABLE</span>
          </label>
          <label class="toggle">
            <input id="executorHeadless" type="checkbox" />
            <span>Headless</span>
          </label>

          <label>Profile dir (optional)
            <input id="executorProfileDir" placeholder="auth_state/camoufox_profile" />
          </label>
          <label>Cookies file (optional)
            <input id="executorCookiesFile" placeholder="auth_state/stake_cookies.json" />
          </label>
        </div>
        <div class="row">
          <button id="btnStartExecutor" class="primary">START</button>
          <button id="btnStopExecutor">STOP</button>
          <span id="stExecutor" class="pill">-</span>
        </div>
      </section>

      <section class="card">
        <div class="sectionTitle">Watchers (snapshot)</div>
        <div class="grid2">
          <div>
            <div class="subTitle">Pragmatic watcher</div>
            <div class="grid2">
              <label class="toggle">
                <input id="watchPragHeadless" type="checkbox" />
                <span>Headless</span>
              </label>
              <label>Cookies
                <input id="watchPragCookies" placeholder="auth_state/stake_cookies.json" />
              </label>
              <label>Profile dir (optional)
                <input id="watchPragProfile" placeholder="" />
              </label>
              <label>Duration sec (0=forever)
                <input id="watchPragDuration" type="number" step="1" min="0" />
              </label>
            </div>
            <div class="row">
              <button id="btnStartWatchPrag" class="primary">START</button>
              <button id="btnStopWatchPrag">STOP</button>
              <span id="stWatchPrag" class="pill">-</span>
            </div>
          </div>
          <div>
            <div class="subTitle">Evolution watcher</div>
            <div class="grid2">
              <label class="toggle">
                <input id="watchEvoHeadless" type="checkbox" />
                <span>Headless</span>
              </label>
              <label>Interval sec
                <input id="watchEvoInterval" type="number" step="0.2" min="0.2" />
              </label>
            </div>
            <div class="row">
              <button id="btnStartWatchEvo" class="primary">START</button>
              <button id="btnStopWatchEvo">STOP</button>
              <span id="stWatchEvo" class="pill">-</span>
            </div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="sectionTitle">Logs</div>
        <div class="row">
          <select id="logSel">
            <option value="executor_pragmatic">executor_pragmatic</option>
            <option value="watch_pragmatic">watch_pragmatic</option>
            <option value="watch_evolution">watch_evolution</option>
          </select>
          <button id="btnClear">CLEAR</button>
        </div>
        <pre id="logBox"></pre>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
